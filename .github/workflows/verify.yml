name: verify

# Enforces three invariants:
#   1. the verifier's own tests pass       (data/test_verify.py)
#   2. every question's answer is correct   (data/verify.py)
#   3. the offline fallback is in sync       (build-fallback.py --check)
# All pure-stdlib Python — no dependencies to install.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Test the verifier itself
        run: python3 -m unittest discover -s data -p "test_*.py" -v

      - name: Verify answers (execute every snippet)
        run: python3 data/verify.py

      - name: Verify offline fallback is in sync with questions.json
        run: python3 build-fallback.py --check
